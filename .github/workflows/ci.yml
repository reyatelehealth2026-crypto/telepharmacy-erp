name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  NODE_VERSION: '20'
  PNPM_VERSION: '10.28.2'

jobs:
  ci:
    name: Lint → Type-check → Test → Build
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: user
          POSTGRES_PASSWORD: password
          POSTGRES_DB: telepharmacy_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Type-check
        run: pnpm type-check

      - name: Test
        run: pnpm test
        env:
          DATABASE_URL: postgresql://user:password@localhost:5432/telepharmacy_test
          REDIS_URL: redis://localhost:6379
          JWT_SECRET: ci-test-jwt-secret-not-for-production
          JWT_REFRESH_SECRET: ci-test-refresh-secret-not-for-production
          LINE_CHANNEL_ACCESS_TOKEN: dummy
          LINE_CHANNEL_SECRET: dummy
          LINE_LIFF_ID: dummy
          GEMINI_API_KEY: dummy
          MEILI_HOST: http://localhost:7700
          MEILI_MASTER_KEY: dummy

      - name: Build
        run: pnpm build
        env:
          DATABASE_URL: postgresql://user:password@localhost:5432/telepharmacy_test
          JWT_SECRET: ci-build-secret
          JWT_REFRESH_SECRET: ci-build-refresh-secret
          LINE_CHANNEL_ACCESS_TOKEN: dummy
          LINE_CHANNEL_SECRET: dummy
          LINE_LIFF_ID: dummy
          GEMINI_API_KEY: dummy
          NEXT_PUBLIC_API_URL: http://localhost:3000
          NEXT_PUBLIC_LIFF_ID: dummy
